name: Publish Windows release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build single-file Windows app
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\ElectricityExplorer.slnx

      - name: Test
        run: dotnet test .\ElectricityExplorer.slnx --configuration Release --no-restore

      - name: Publish single-file Windows app
        run: >
          dotnet publish
          .\src\ElectricityExplorer.Desktop\ElectricityExplorer.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output .\artifacts\publish
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugSymbols=false
          -p:DebugType=None

      - name: Verify single executable
        run: |
          $files = @(Get-ChildItem .\artifacts\publish -Recurse -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "ElectricityExplorer.exe") {
              throw "Expected one ElectricityExplorer.exe, found $($files.Count) files."
          }

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "latest"
          $asset = Resolve-Path .\artifacts\publish\ElectricityExplorer.exe
          $notes = @'
          Automated build of the latest successful commit on `main`.

          Requires the .NET 10 Desktop Runtime and Microsoft Edge WebView2 Runtime.
          '@

          if (gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null) {
              gh release edit $tag `
                  --repo $env:GITHUB_REPOSITORY `
                  --title "Electricity Explorer - Latest" `
                  --notes $notes
              gh release upload $tag $asset `
                  --repo $env:GITHUB_REPOSITORY `
                  --clobber

              git tag --force $tag $env:GITHUB_SHA
              git push origin "refs/tags/$tag" --force
          }
          else {
              gh release create $tag $asset `
                  --repo $env:GITHUB_REPOSITORY `
                  --target $env:GITHUB_SHA `
                  --title "Electricity Explorer - Latest" `
                  --notes $notes
          }
