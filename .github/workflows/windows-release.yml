name: Publish Windows release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VeloPack Windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore .\ElectricityExplorer.slnx

      - name: Test
        run: dotnet test .\ElectricityExplorer.slnx --configuration Release --no-restore

      - name: Set release version
        id: release-version
        run: |
          "version=0.${{ github.run_number }}.${{ github.run_attempt }}" >> $env:GITHUB_OUTPUT

      - name: Publish single-file Windows app
        run: >
          dotnet publish
          .\src\ElectricityExplorer.Desktop\ElectricityExplorer.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output .\artifacts\publish
          -p:Version=${{ steps.release-version.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugSymbols=false
          -p:DebugType=None

      - name: Verify single executable
        run: |
          $files = @(Get-ChildItem .\artifacts\publish -Recurse -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "ElectricityExplorer.exe") {
              throw "Expected one ElectricityExplorer.exe, found $($files.Count) files."
          }

      - name: Create release notes
        run: |
          @'
          Automated build of the latest successful commit on `main`.

          The installer checks for the .NET 10 Desktop Runtime and Microsoft Edge
          WebView2 Evergreen Runtime and offers to install either prerequisite when
          it is missing.
          '@ | Set-Content .\artifacts\release-notes.md -Encoding utf8NoBOM

      - name: Download previous VeloPack release
        env:
          VPK_OUTPUT_DIR: .\artifacts\releases
          VPK_REPO_URL: https://github.com/${{ github.repository }}
          VPK_TOKEN: ${{ github.token }}
        run: |
          dotnet vpk download github `
              --repoUrl "$env:VPK_REPO_URL" `
              --token "$env:VPK_TOKEN" `
              --outputDir "$env:VPK_OUTPUT_DIR"

      - name: Pack installer and update assets
        run: |
          dotnet vpk pack `
              --packId DavidWengier.ElectricityExplorer `
              --packVersion "${{ steps.release-version.outputs.version }}" `
              --packDir .\artifacts\publish `
              --mainExe ElectricityExplorer.exe `
              --packTitle "Electricity Explorer" `
              --packAuthors "David Wengier" `
              --releaseNotes .\artifacts\release-notes.md `
              --outputDir .\artifacts\releases `
              --runtime win-x64 `
              --icon .\src\ElectricityExplorer.Desktop\Assets\ElectricityExplorer.ico `
              --framework "net10.0-x64-desktop,webview2" `
              --noPortable

      - name: Verify VeloPack assets
        run: |
          $version = "${{ steps.release-version.outputs.version }}"
          $requiredFiles = @(
              ".\artifacts\releases\DavidWengier.ElectricityExplorer-$version-full.nupkg",
              ".\artifacts\releases\assets.win.json",
              ".\artifacts\releases\releases.win.json"
          )

          foreach ($file in $requiredFiles) {
              if (-not (Test-Path $file -PathType Leaf)) {
                  throw "Expected VeloPack asset '$file' was not created."
              }
          }

          $installer = ".\artifacts\releases\DavidWengier.ElectricityExplorer-win-Setup.exe"
          if (-not (Test-Path $installer -PathType Leaf)) {
              throw "Expected VeloPack installer '$installer' was not created."
          }

      - name: Publish versioned GitHub release
        env:
          VPK_OUTPUT_DIR: .\artifacts\releases
          VPK_REPO_URL: https://github.com/${{ github.repository }}
          VPK_TOKEN: ${{ github.token }}
        run: |
          dotnet vpk upload github `
              --repoUrl "$env:VPK_REPO_URL" `
              --token "$env:VPK_TOKEN" `
              --outputDir "$env:VPK_OUTPUT_DIR" `
              --publish `
              --tag "v${{ steps.release-version.outputs.version }}" `
              --releaseName "Electricity Explorer ${{ steps.release-version.outputs.version }}" `
              --targetCommitish "$env:GITHUB_SHA"
